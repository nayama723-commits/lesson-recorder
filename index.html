<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レッスンメモ音声入力</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      background: #f9f9f9;
      color: #333;
    }
    h2 { text-align: center; color: #2c3e50; }
    label { font-weight: bold; display: block; margin: 10px 0 5px; }
    select, button, textarea, #result {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button.recording {
      background: #c0392b;
    }
    #status {
      color: #e74c3c;
      font-weight: bold;
      text-align: center;
      min-height: 1.5em;
      margin: 10px 0;
    }
    #result {
      background: white;
      min-height: 120px;
      white-space: pre-wrap;
      padding: 12px;
      border: 1px solid #ddd;
    }
    .tips {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin: 10px 0 20px;
    }
  </style>
</head>
<body>
  <h2>レッスン後メモ入力（音声）</h2>

  <label for="studentSelect">生徒を選択：</label>
  <select id="studentSelect">
    <option value="">―― 生徒を選んでください ――</option>
    <!-- Add your students manually here for now -->
    <option value="テスト生徒1">テスト生徒1</option>
    <option value="テスト生徒2">テスト生徒2</option>
    <option value="テスト生徒3">テスト生徒3</option>
    <!-- You can add more <option> tags later -->
  </select>

  <button id="recordBtn" onclick="toggleRecording()">録音開始</button>
  <div id="status"></div>
  <div class="tips">
    ボタンを押したら<strong>すぐに</strong>はっきり話し始めてください。<br>
    例: 「今日は名刺を10個勉強しました。会話練習をしました。宿題は95ページです。」
  </div>

  <h3>認識されたテキスト：</h3>
  <div id="result"></div>

  <script>
    let recognition = null;
    let isRecording = false;

    function toggleRecording() {
      const student = document.getElementById('studentSelect').value;
      if (!student) {
        alert('まず生徒を選択してください');
        return;
      }

      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
        alert('お使いのブラウザは音声認識に対応していません。\nChrome または Edge をお使いください。');
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();

      recognition.lang = 'ja-JP';
      recognition.interimResults = true;
      recognition.continuous = false;   // short recordings – more reliable on Mac

      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('recordBtn').textContent = '録音中… 話してください';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('status').textContent = '録音開始しました！すぐに話し始めてください';
        document.getElementById('result').textContent = '';
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('result').textContent = transcript;
      };

      recognition.onerror = (event) => {
        let msg = 'エラー: ' + event.error;
        if (event.error === 'no-speech') msg += '（無音が検知されました。すぐに話し始めてください）';
        if (event.error === 'not-allowed') msg += '（マイクが許可されていません。アドレスバーの鍵アイコン → サイトの設定 → マイクを許可）';
        if (event.error === 'network') msg += '（ネットワークエラー）';
        document.getElementById('status').textContent = msg;
        console.error('Speech Error:', event.error, event.message || '詳細なし');
        stopRecording();
      };

      recognition.onend = () => {
        document.getElementById('recordBtn').textContent = '録音開始';
        document.getElementById('recordBtn').classList.remove('recording');
        isRecording = false;

        const text = document.getElementById('result').textContent.trim();
        if (text) {
          document.getElementById('status').textContent = '録音完了。テキストをコピーしてスプレッドシートに貼り付けてください';
          // You can add alert("テキストをコピーしました！") or auto-copy later
        } else {
          document.getElementById('status').textContent = '何も認識されませんでした。再試行してください（すぐに話す）';
        }
      };

      recognition.start();
    }

    function stopRecording() {
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
      isRecording = false;
      document.getElementById('recordBtn').textContent = '録音開始';
      document.getElementById('recordBtn').classList.remove('recording');
    }
  </script>
</body>
</html>
