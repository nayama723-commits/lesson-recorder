<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レッスンメモ音声入力</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 700px; margin: auto; background: #f9f9f9; }
    h2 { text-align: center; color: #333; }
    select, button, #result { margin: 15px 0; padding: 12px; width: 100%; font-size: 17px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
    button.recording { background: #c0392b; }
    #status { color: #e74c3c; font-weight: bold; text-align: center; min-height: 1.5em; margin: 10px 0; }
    #result { background: white; min-height: 120px; white-space: pre-wrap; padding: 12px; border: 1px solid #ddd; }
    .tips { font-size: 14px; color: #555; text-align: center; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>レッスン後メモ入力（音声）</h2>

  <label for="studentSelect">生徒を選択：</label>
  <select id="studentSelect">
    <option value="">―― 生徒を選んでください ――</option>
    <!-- Add your ~17 students here manually -->
    <option value="テスト生徒1">Akemi</option>
    <option value="テスト生徒2">Cayden</option>
    <option value="テスト生徒3">Mason</option>
    <!-- Add more <option value="生徒名">生徒名</option> -->
  </select>

  <button id="recordBtn" onclick="toggleRecording()">録音開始</button>
  <div id="status"></div>
  <div class="tips">
    ボタンを押したら<strong>すぐに</strong>はっきり話し始めてください。<br>
    例: 「今日は名刺を10個勉強しました。会話練習をしました。宿題は95ページです。」
  </div>

  <h3>認識されたテキスト：</h3>
  <div id="result"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-SKzRZYiHmFHsBBFCyZCA6vOiLj9dvfHDm_gayWY_EHkZ04BxKMMTOu3zPwvHMClz/exec';  // ← Paste your GAS /exec URL here!

    let recognition = null;
    let isRecording = false;

    function toggleRecording() {
      const student = document.getElementById('studentSelect').value;
      if (!student) return alert('生徒を選択してください');

      if (isRecording) stopRecording();
      else startRecording();
    }

    function startRecording() {
      if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
        alert('ブラウザが音声認識非対応です。Chromeを使ってください。');
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();

      recognition.lang = 'ja-JP';
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('recordBtn').textContent = '録音中… 話してください';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('status').textContent = '録音開始！すぐに話し始めて';
        document.getElementById('result').textContent = '';
      };

      recognition.onresult = event => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('result').textContent = transcript;
      };

      recognition.onerror = event => {
        let msg = 'エラー: ' + event.error;
        if (event.error === 'no-speech') msg += '（無音検知 - すぐに話し始めて！）';
        if (event.error === 'not-allowed') msg += '（マイク許可を確認 - アドレスバー鍵アイコン → サイト設定 → マイク）';
        document.getElementById('status').textContent = msg;
        console.error('Speech Error:', event);
        stopRecording();
      };

      recognition.onend = () => {
        document.getElementById('recordBtn').textContent = '録音開始';
        document.getElementById('recordBtn').classList.remove('recording');
        isRecording = false;

        const text = document.getElementById('result').textContent.trim();
        if (text) {
          document.getElementById('status').textContent = '録音完了 → 保存中...';
          parseAndSave(text);
        } else {
          document.getElementById('status').textContent = 'テキストが取れませんでした。再試行してください';
        }
      };

      recognition.start();
    }

    function stopRecording() {
      if (recognition) recognition.stop();
      recognition = null;
      isRecording = false;
      document.getElementById('recordBtn').textContent = '録音開始';
      document.getElementById('recordBtn').classList.remove('recording');
    }

    function parseAndSave(rawText) {
      const student = document.getElementById('studentSelect').value;
      const today = new Date().toISOString().split('T')[0];

      let lesson = rawText.trim();
      let homework = '';
      let notes = '';

      const hwKeywords = ['宿題', '課題', '宿題は', '宿題：'];
      let hwIndex = -1;
      for (let kw of hwKeywords) {
        const idx = rawText.lastIndexOf(kw);
        if (idx > hwIndex) hwIndex = idx;
      }
      if (hwIndex !== -1) {
        homework = rawText.substring(hwIndex).trim();
        lesson = rawText.substring(0, hwIndex).trim();
      }

      // Send to GAS
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',  // Required for GAS – we can't read response reliably, but save still works
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student: student,
          date: today,
          lessonContent: lesson,
          notes: notes,
          homework: homework
        })
      })
      .then(() => {
        document.getElementById('status').textContent = '保存しました！';
        document.getElementById('result').textContent = '';
      })
      .catch(err => {
        document.getElementById('status').textContent = '保存失敗（ネットワークを確認）: ' + err.message;
        console.error(err);
      });
    }
  </script>
</body>
</html>
