<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-SKzRZYiHmFHsBBFCyZCA6vOiLj9dvfHDm_gayWY_EHkZ04BxKMMTOu3zPwvHMClz/exec';

  let recognition = null;
  let isRecording = false;
  let finalTranscript = '';  // Store confirmed (final) text

  function toggleRecording() {
    const student = document.getElementById('studentSelect').value;
    if (!student) {
      alert('生徒を選択してください');
      return;
    }

    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
      alert('ブラウザが音声認識非対応です。Chromeを使ってください。');
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.lang = 'ja-JP';
    recognition.interimResults = true;
    recognition.continuous = true;

    recognition.onstart = () => {
      isRecording = true;
      finalTranscript = '';  // Reset final on new recording
      document.getElementById('result').textContent = '';
      document.getElementById('recordBtn').textContent = '録音中… もう一度押して停止';
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('status').textContent = '録音開始しました。話してください';
      document.getElementById('saveBtn').style.display = 'none';
    };

    recognition.onresult = event => {
      let interimTranscript = '';
      finalTranscript = '';  // Rebuild final each time

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcriptPart = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcriptPart + ' ';  // Append final parts
        } else {
          interimTranscript = transcriptPart;  // Show live partial
        }
      }

      // Display final + current interim (no duplicates from pauses)
      document.getElementById('result').textContent = finalTranscript + interimTranscript;
    };

    recognition.onerror = event => {
      let msg = 'エラー: ' + event.error;
      if (event.error === 'no-speech') msg += '（無音検知）';
      if (event.error === 'not-allowed') msg += '（マイク許可を確認）';
      document.getElementById('status').textContent = msg;
      console.error('Speech Error:', event);
      stopRecording();
    };

    recognition.onend = () => {
      if (!isRecording) return;

      document.getElementById('recordBtn').textContent = '録音開始';
      document.getElementById('recordBtn').classList.remove('recording');
      isRecording = false;

      // Final clean-up: trim extra spaces
      const text = document.getElementById('result').textContent.trim();
      document.getElementById('result').textContent = text;

      if (text) {
        document.getElementById('status').textContent = '録音終了。テキストを編集して「シートに保存」を押してください';
        document.getElementById('saveBtn').style.display = 'inline-block';
      } else {
        document.getElementById('status').textContent = 'テキストが取れませんでした';
      }
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) {
      recognition.stop();
      recognition = null;
    }
    isRecording = false;
    document.getElementById('recordBtn').textContent = '録音開始';
    document.getElementById('recordBtn').classList.remove('recording');
  }

  // saveToSheet, clearResult remain the same as before
  function saveToSheet() {
    const rawText = document.getElementById('result').textContent.trim();
    if (!rawText) {
      alert('保存するテキストがありません');
      return;
    }

    const student = document.getElementById('studentSelect').value;
    const today = new Date().toISOString().split('T')[0];

    let lesson = rawText;
    let homework = '';
    let notes = '';

    const hwKeywords = ['宿題', '課題', '宿題は', '宿題：'];
    let hwIndex = -1;
    for (let kw of hwKeywords) {
      const idx = rawText.lastIndexOf(kw);
      if (idx > hwIndex) hwIndex = idx;
    }
    if (hwIndex !== -1) {
      homework = rawText.substring(hwIndex).trim();
      lesson = rawText.substring(0, hwIndex).trim();
    }

    document.getElementById('status').textContent = '保存中...';

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student: student,
        date: today,
        lessonContent: lesson,
        notes: notes,
        homework: homework
      })
    })
    .then(() => {
      document.getElementById('status').textContent = '保存成功！シートを確認してください';
      document.getElementById('result').textContent = '';
      document.getElementById('saveBtn').style.display = 'none';
    })
    .catch(err => {
      document.getElementById('status').textContent = '保存失敗: ' + err.message;
      console.error('Fetch error:', err);
    });
  }

  function clearResult() {
    document.getElementById('result').textContent = '';
    document.getElementById('status').textContent = 'クリアしました';
    document.getElementById('saveBtn').style.display = 'none';
  }
</script>
