<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レッスンメモ音声入力</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 700px; margin: auto; background: #f9f9f9; }
    h2 { text-align: center; color: #333; }
    select, button, #result { margin: 15px 0; padding: 12px; width: 100%; font-size: 17px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px 20px; margin: 5px; }
    button.recording { background: #c0392b; }
    button#saveBtn { background: #2980b9; }
    button#clearBtn { background: #95a5a6; }
    #status { color: #e74c3c; font-weight: bold; text-align: center; min-height: 1.5em; margin: 15px 0; font-size: 16px; }
    #result { 
      background: white; 
      min-height: 160px; 
      white-space: pre-wrap; 
      padding: 12px; 
      border: 1px solid #aaa; 
      border-radius: 8px; 
      outline: none; 
      cursor: text; 
    }
    #result:focus { border-color: #2980b9; box-shadow: 0 0 5px rgba(41,128,185,0.5); }
    .tips { font-size: 14px; color: #555; text-align: center; margin: 10px 0 20px; }
    .button-group { text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>レッスン後メモ入力（音声）</h2>

  <label for="studentSelect">生徒を選択：</label>
  <select id="studentSelect">
    <option value="">―― 生徒を選んでください ――</option>
    <option value="Akemi">Akemi</option>
    <option value="Mason">Mason</option>
    <option value="Cayden">Cayden</option>
    <option value="Hani">Hani</option>
    <option value="Kelwin">Kelwin</option>
    <option value="Jayden">Jayden</option>
    <option value="Kimo">Kimo</option>
    <option value="Jinho">Jinho</option>
    <option value="Lev">Lev</option>
    <option value="Logan">Logan</option>
    <option value="Hanna">Hanna</option>
    <option value="Kevin">Kevin</option>
    <option value="Leia">Leia</option>
    <option value="Luke">Luke</option>
    <option value="Stephanie">Stephanie</option>
    <option value="Bianca">Bianca</option>
  </select>

  <button id="recordBtn" onclick="toggleRecording()">録音開始</button>
  <div id="status"></div>
  <div class="tips">
    「録音開始」を押して話し始め、もう一度押して終了してください。<br>
    テキストが出たら編集して「シートに保存」を押すだけ（常に表示されます）。
  </div>

  <h3>認識されたテキスト（編集可）：</h3>
  <div id="result" contenteditable="true"></div>

  <div class="button-group">
    <button id="saveBtn" onclick="saveToSheet()">シートに保存</button>
    <button id="clearBtn" onclick="clearResult()">クリア</button>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-SKzRZYiHmFHsBBFCyZCA6vOiLj9dvfHDm_gayWY_EHkZ04BxKMMTOu3zPwvHMClz/exec';

    let recognition = null;
    let isRecording = false;
    let lastFinalText = '';

    function toggleRecording() {
      const student = document.getElementById('studentSelect').value;
      if (!student) {
        alert('生徒を選択してください');
        return;
      }

      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
        alert('ブラウザが音声認識非対応です。Chromeを使ってください。');
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();

      recognition.lang = 'ja-JP';
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onstart = () => {
        isRecording = true;
        lastFinalText = '';
        document.getElementById('result').textContent = '';
        document.getElementById('recordBtn').textContent = '録音中… もう一度押して停止';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('status').textContent = '録音開始しました。話してください';
      };

      recognition.onresult = event => {
        let interim = '';
        let newFinal = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const part = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            if (!lastFinalText.endsWith(part.trim())) {
              newFinal += part + ' ';
            }
          } else {
            interim = part;
          }
        }

        if (newFinal) {
          lastFinalText += newFinal;
        }

        document.getElementById('result').textContent = lastFinalText.trim() + ' ' + interim;
      };

      recognition.onerror = event => {
        let msg = 'エラー: ' + event.error;
        if (event.error === 'no-speech') msg += '（無音検知）';
        if (event.error === 'not-allowed') msg += '（マイク許可を確認）';
        document.getElementById('status').textContent = msg;
        console.error('Speech Error:', event);
        stopRecording();
      };

      recognition.onend = () => {
        if (!isRecording) return;

        document.getElementById('recordBtn').textContent = '録音開始';
        document.getElementById('recordBtn').classList.remove('recording');
        isRecording = false;

        const cleaned = document.getElementById('result').textContent.trim();
        document.getElementById('result').textContent = cleaned;

        if (cleaned) {
          document.getElementById('status').textContent = '録音終了。テキストを編集して「シートに保存」を押してください';
        } else {
          document.getElementById('status').textContent = 'テキストが取れませんでした';
        }
      };

      recognition.start();
    }

    function stopRecording() {
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
      isRecording = false;
      document.getElementById('recordBtn').textContent = '録音開始';
      document.getElementById('recordBtn').classList.remove('recording');
    }

    function saveToSheet() {
      const rawText = document.getElementById('result').textContent.trim();
      if (!rawText) {
        alert('保存するテキストがありません');
        return;
      }

      const student = document.getElementById('studentSelect').value;
      const today = new Date().toISOString().split('T')[0];

      let lesson = rawText;
      let homework = '';
      let notes = '';

      const hwKeywords = ['宿題', '課題', '宿題は', '宿題：'];
      let hwIndex = -1;
      for (let kw of hwKeywords) {
        const idx = rawText.lastIndexOf(kw);
        if (idx > hwIndex) hwIndex = idx;
      }
      if (hwIndex !== -1) {
        homework = rawText.substring(hwIndex).trim();
        lesson = rawText.substring(0, hwIndex).trim();
      }

      document.getElementById('status').textContent = '保存中...';

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student: student,
          date: today,
          lessonContent: lesson,
          notes: notes,
          homework: homework
        })
      })
      .then(() => {
        document.getElementById('status').textContent = '保存成功！シートを確認してください';
        document.getElementById('result').textContent = '';
      })
      .catch(err => {
        document.getElementById('status').textContent = '保存失敗: ' + err.message;
        console.error('Fetch error:', err);
      });
    }

    function clearResult() {
      document.getElementById('result').textContent = '';
      document.getElementById('status').textContent = 'クリアしました';
    }
  </script>
</body>
</html>
